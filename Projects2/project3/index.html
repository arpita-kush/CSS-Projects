<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text animation</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
            font-family: "Urbanist";
        }
        body{
            height: 100vh;
            display: grid;
            place-items: center;
            background-color: black;
        }
        h1{
            font-size: 96px;
            text-shadow: -1px 2px 3px rgba(236, 247, 76, 0.2) ;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            position: relative;
            
        }
        h1::before{
            content: "Subscribe...";
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            color: plum;
            text-transform: uppercase;
            border-right: 2px solid plum;
            overflow: hidden;
            animation: textreveal 1s linear infinite ;

        }
        @keyframes textreveal{
            0%{
                width: 0%;
            } 50%
            {
            width: 100%;
            }
            100%{
                width: 0%;
            }
        }

        
    </style>
</head>
<body>
    <h1>Subscribe...</h1>
</body>
</html>
