<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color:  black;
            position: relative;
        }
        .child{
            width: 500px;
            height: 500px;
            background-color:  plum;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            margin: auto;
            color: white;
            text-transform: uppercase;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;


        }
    </style>

</head>
<body>
    <div class="child">Hello!!!!!</div>
</body>
</html>
